---
name: Release

# Release runs ONLY on strict SemVer tags (v1.2.3). Pre-release tags
# (v1.2.3-rc.1) and non-tag pushes are intentionally not matched.
# Can also be triggered manually via workflow_dispatch; the tag must
# already exist in the repository.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"

  workflow_dispatch:
    inputs:
      tag:
        description: "Existing SemVer tag to release (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write   # create GitHub release, upload artifacts
  packages: write   # push container images to GHCR
  id-token: write   # reserved for future OIDC use (cosign, attestations)

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          # GoReleaser needs the full history to generate a changelog and
          # to derive {{ .Version }} from the tag annotation.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      # QEMU lets us build the linux/arm64 image on an amd64 runner.
      # buildx provides the multi-arch builder GoReleaser drives.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR requires lowercase image paths; org/repo on GitHub may be mixed case.
      - name: Compute lowercase repository
        id: repo
        run: |
          lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "lower=${lower}" >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7.2.1
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_REGISTRY: ghcr.io
          DOCKER_REPO: ${{ steps.repo.outputs.lower }}
          # When triggered manually, tell GoReleaser which tag to use.
          GORELEASER_CURRENT_TAG: ${{ inputs.tag || github.ref_name }}
